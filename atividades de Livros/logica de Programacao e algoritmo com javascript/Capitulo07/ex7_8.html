<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ArquivoCSS/estilo.css">
</head>
<body>
    <img src="img/ex7_8.jpg" alt="">
    <h1>Programa Caixa de Loja</h1>
    <form action="">
        <p>Data de Vencimento: <input type="date" name="inData" id="inData" autofocus required></p>
        
        <p>Valor da Conta R$: <input type="number" name="inValor" id="inValor" min="0" step="0.01" class="alinha-direita" required></p>
        <input type="submit" value="Calcular Multa e Juros">

        <p>Valor da Multa R$: <input type="number" name="outMulta" id="outMulta" readonly></p>

        <p>Valor do Juros R$: <input type="number" name="outJuros" id="outJuros" readonly></p>

        <p>Total a Pagar R$....</p>
        <input type="number" name="outTotal" id="outTotal" readonly>
        <input type="reset" value="Nova Conta">
    </form>
</body>
<script src="ArquivoJS/ex7_8.js"></script>
</html>
