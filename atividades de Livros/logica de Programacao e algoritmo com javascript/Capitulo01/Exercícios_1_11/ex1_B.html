<script>
    //lê o valor do produto
    const valorTotalDaPizza = Number(prompt("Valor da conta R$: "));
    const quantidadeDeClienteAPagar = Number(prompt("Números de Cliente:"));

    //calcula o valor por cada pessoa 
    const valorPorPessoa = valorTotalDaPizza / quantidadeDeClienteAPagar;

    // exibe as respostas
    alert(`Valor por Cliente R$: ${valorPorPessoa.toFixed(2)}`)
</script>
